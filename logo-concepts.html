<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Howard Roofing - Logo Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Merriweather:wght@700;900&family=Oswald:wght@500;600;700&family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f0f0; padding: 40px; }
h1 { text-align: center; font-size: 14px; text-transform: uppercase; letter-spacing: 0.2em; color: #999; margin-bottom: 40px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 1100px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 48px 40px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; color: #999; margin-bottom: 24px; }
.card .dark { background: #1e293b; border-radius: 8px; padding: 40px; margin-top: 20px; }
.card .slate { background: #f8f7f4; border-radius: 8px; padding: 40px; margin-top: 12px; }
.tag { display: inline-block; background: #e8e8e8; color: #666; font-size: 11px; padding: 4px 10px; border-radius: 3px; margin-top: 16px; }
</style>
</head>
<body>
<h1>Howard Roofing & Construction - Logo Concepts</h1>
<div class="grid">

<!-- CONCEPT 1: Bold Roofline Mark -->
<div class="card">
  <h2>Concept 1 - The Roofline</h2>
  <svg width="360" height="120" viewBox="0 0 360 120">
    <!-- Roofline icon -->
    <polygon points="40,65 65,35 90,65" fill="none" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
    <line x1="35" y1="65" x2="95" y2="65" stroke="#1e293b" stroke-width="3"/>
    <line x1="65" y1="35" x2="65" y2="28" stroke="#d4a853" stroke-width="3"/>
    <rect x="55" y="55" width="8" height="10" fill="#d4a853" rx="1"/>
    <!-- Text -->
    <text x="110" y="52" font-family="Oswald, sans-serif" font-weight="700" font-size="28" fill="#1e293b" letter-spacing="2">HOWARD</text>
    <text x="110" y="74" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="4">ROOFING &amp; CONSTRUCTION</text>
    <line x1="110" y1="58" x2="310" y2="58" stroke="#d4a853" stroke-width="1.5"/>
  </svg>
  <div class="dark">
    <svg width="360" height="120" viewBox="0 0 360 120">
      <polygon points="40,65 65,35 90,65" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
      <line x1="35" y1="65" x2="95" y2="65" stroke="#ffffff" stroke-width="3"/>
      <line x1="65" y1="35" x2="65" y2="28" stroke="#d4a853" stroke-width="3"/>
      <rect x="55" y="55" width="8" height="10" fill="#d4a853" rx="1"/>
      <text x="110" y="52" font-family="Oswald, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="2">HOWARD</text>
      <text x="110" y="74" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="4">ROOFING &amp; CONSTRUCTION</text>
      <line x1="110" y1="58" x2="310" y2="58" stroke="#d4a853" stroke-width="1.5"/>
    </svg>
  </div>
  <span class="tag">Clean + Professional</span>
</div>

<!-- CONCEPT 2: Shield / Badge -->
<div class="card">
  <h2>Concept 2 - The Shield</h2>
  <svg width="360" height="140" viewBox="0 0 360 140">
    <!-- Shield shape -->
    <path d="M30,20 L80,20 L80,80 L55,100 L30,80 Z" fill="#1e293b" stroke="#d4a853" stroke-width="2"/>
    <!-- Roofline inside shield -->
    <polygon points="42,58 55,40 68,58" fill="none" stroke="#d4a853" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="46" y="76" font-family="Bebas Neue, sans-serif" font-size="11" fill="#d4a853" letter-spacing="1">EST</text>
    <text x="46" y="30" font-family="Bebas Neue, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">NC</text>
    <!-- Text -->
    <text x="100" y="46" font-family="Merriweather, serif" font-weight="900" font-size="26" fill="#1e293b">HOWARD</text>
    <text x="100" y="68" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#d4a853" letter-spacing="5">ROOFING &amp; CONSTRUCTION</text>
    <text x="100" y="88" font-family="Inter, sans-serif" font-weight="500" font-size="10" fill="#6b7280" letter-spacing="2">WILMINGTON, NC</text>
    <line x1="100" y1="52" x2="330" y2="52" stroke="#e8e8e8" stroke-width="1"/>
  </svg>
  <div class="dark">
    <svg width="360" height="140" viewBox="0 0 360 140">
      <path d="M30,20 L80,20 L80,80 L55,100 L30,80 Z" fill="rgba(212,168,83,0.1)" stroke="#d4a853" stroke-width="2"/>
      <polygon points="42,58 55,40 68,58" fill="none" stroke="#d4a853" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="46" y="76" font-family="Bebas Neue, sans-serif" font-size="11" fill="#d4a853" letter-spacing="1">EST</text>
      <text x="46" y="30" font-family="Bebas Neue, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="1">NC</text>
      <text x="100" y="46" font-family="Merriweather, serif" font-weight="900" font-size="26" fill="#ffffff">HOWARD</text>
      <text x="100" y="68" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#d4a853" letter-spacing="5">ROOFING &amp; CONSTRUCTION</text>
      <text x="100" y="88" font-family="Inter, sans-serif" font-weight="500" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="2">WILMINGTON, NC</text>
      <line x1="100" y1="52" x2="330" y2="52" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </svg>
  </div>
  <span class="tag">Veteran / Authority</span>
</div>

<!-- CONCEPT 3: Stacked Bold -->
<div class="card">
  <h2>Concept 3 - The Stack</h2>
  <svg width="360" height="130" viewBox="0 0 360 130">
    <text x="180" y="38" font-family="Oswald, sans-serif" font-weight="700" font-size="14" fill="#d4a853" letter-spacing="8" text-anchor="middle">VETERAN-LED SINCE 2016</text>
    <line x1="30" y1="46" x2="330" y2="46" stroke="#e0e0e0" stroke-width="1"/>
    <text x="180" y="80" font-family="Bebas Neue, sans-serif" font-size="48" fill="#1e293b" letter-spacing="4" text-anchor="middle">HOWARD</text>
    <line x1="30" y1="90" x2="330" y2="90" stroke="#d4a853" stroke-width="2"/>
    <text x="180" y="110" font-family="Inter, sans-serif" font-weight="600" font-size="12" fill="#6b7280" letter-spacing="6" text-anchor="middle">ROOFING &amp; CONSTRUCTION</text>
  </svg>
  <div class="dark">
    <svg width="360" height="130" viewBox="0 0 360 130">
      <text x="180" y="38" font-family="Oswald, sans-serif" font-weight="700" font-size="14" fill="#d4a853" letter-spacing="8" text-anchor="middle">VETERAN-LED SINCE 2016</text>
      <line x1="30" y1="46" x2="330" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="180" y="80" font-family="Bebas Neue, sans-serif" font-size="48" fill="#ffffff" letter-spacing="4" text-anchor="middle">HOWARD</text>
      <line x1="30" y1="90" x2="330" y2="90" stroke="#d4a853" stroke-width="2"/>
      <text x="180" y="110" font-family="Inter, sans-serif" font-weight="600" font-size="12" fill="rgba(255,255,255,0.5)" letter-spacing="6" text-anchor="middle">ROOFING &amp; CONSTRUCTION</text>
    </svg>
  </div>
  <span class="tag">Bold + Statement</span>
</div>

<!-- CONCEPT 4: Monogram + Industrial -->
<div class="card">
  <h2>Concept 4 - The Monogram</h2>
  <svg width="360" height="130" viewBox="0 0 360 130">
    <!-- H monogram in hexagon -->
    <polygon points="55,15 80,5 105,15 105,50 80,60 55,50" fill="#1e293b" stroke="none"/>
    <text x="80" y="44" font-family="Bebas Neue, sans-serif" font-size="36" fill="#d4a853" text-anchor="middle">H</text>
    <!-- Roofline accent on top of H -->
    <line x1="67" y1="20" x2="80" y2="12" stroke="#d4a853" stroke-width="2"/>
    <line x1="80" y1="12" x2="93" y2="20" stroke="#d4a853" stroke-width="2"/>
    <!-- Text -->
    <text x="125" y="30" font-family="Rajdhani, sans-serif" font-weight="700" font-size="30" fill="#1e293b" letter-spacing="1">HOWARD</text>
    <text x="125" y="48" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#d4a853" letter-spacing="5">ROOFING &amp; CONSTRUCTION</text>
    <!-- Bottom bar -->
    <rect x="125" y="55" width="200" height="2" fill="#1e293b" rx="1"/>
    <text x="125" y="72" font-family="Inter, sans-serif" font-weight="500" font-size="9" fill="#9ca3af" letter-spacing="3">WILMINGTON, NC  |  EST. 2016</text>
  </svg>
  <div class="dark">
    <svg width="360" height="130" viewBox="0 0 360 130">
      <polygon points="55,15 80,5 105,15 105,50 80,60 55,50" fill="rgba(212,168,83,0.15)" stroke="#d4a853" stroke-width="1.5"/>
      <text x="80" y="44" font-family="Bebas Neue, sans-serif" font-size="36" fill="#d4a853" text-anchor="middle">H</text>
      <line x1="67" y1="20" x2="80" y2="12" stroke="#d4a853" stroke-width="2"/>
      <line x1="80" y1="12" x2="93" y2="20" stroke="#d4a853" stroke-width="2"/>
      <text x="125" y="30" font-family="Rajdhani, sans-serif" font-weight="700" font-size="30" fill="#ffffff" letter-spacing="1">HOWARD</text>
      <text x="125" y="48" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#d4a853" letter-spacing="5">ROOFING &amp; CONSTRUCTION</text>
      <rect x="125" y="55" width="200" height="2" fill="rgba(255,255,255,0.15)" rx="1"/>
      <text x="125" y="72" font-family="Inter, sans-serif" font-weight="500" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="3">WILMINGTON, NC  |  EST. 2016</text>
    </svg>
  </div>
  <span class="tag">Modern + Industrial</span>
</div>

<!-- CONCEPT 5: Construction Stripe -->
<div class="card" style="grid-column: 1 / -1;">
  <h2>Concept 5 - The Stripe</h2>
  <svg width="600" height="100" viewBox="0 0 600 100">
    <!-- Gold accent bar -->
    <rect x="0" y="0" width="6" height="100" fill="#d4a853"/>
    <!-- Roofline mark -->
    <polygon points="30,55 50,30 70,55" fill="none" stroke="#1e293b" stroke-width="3.5" stroke-linejoin="round"/>
    <rect x="40" y="47" width="6" height="8" fill="#d4a853" rx="1"/>
    <!-- Main text -->
    <text x="90" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="34" fill="#1e293b" letter-spacing="3">HOWARD</text>
    <text x="260" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="34" fill="#d4a853" letter-spacing="3">ROOFING</text>
    <text x="90" y="68" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="5">&amp; CONSTRUCTION  |  WILMINGTON, NC  |  EST. 2016</text>
  </svg>
  <div class="dark">
    <svg width="600" height="100" viewBox="0 0 600 100">
      <rect x="0" y="0" width="6" height="100" fill="#d4a853"/>
      <polygon points="30,55 50,30 70,55" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>
      <rect x="40" y="47" width="6" height="8" fill="#d4a853" rx="1"/>
      <text x="90" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="34" fill="#ffffff" letter-spacing="3">HOWARD</text>
      <text x="260" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="34" fill="#d4a853" letter-spacing="3">ROOFING</text>
      <text x="90" y="68" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="5">&amp; CONSTRUCTION  |  WILMINGTON, NC  |  EST. 2016</text>
    </svg>
  </div>
  <span class="tag">Wide Format / Header</span>
</div>

</div>
</body>
</html>
